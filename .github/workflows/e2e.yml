name: E2E

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: application

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm
          cache-dependency-path: application/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Firefox
        run: pnpm --filter "@web-speed-hackathon-2026/e2e" exec playwright install --with-deps firefox

      - name: Build application
        run: pnpm run build

      - name: Start application
        run: pnpm run start > /tmp/cax-server.log 2>&1 &

      - name: Wait for application
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/cax-server.log
          exit 1

      - name: Run E2E
        env:
          CI: "true"
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_WORKERS: "1"
        run: pnpm --filter "@web-speed-hackathon-2026/e2e" run test

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: playwright-artifacts
          path: |
            application/e2e/test-results
            application/e2e/playwright-report
            /tmp/cax-server.log
          if-no-files-found: ignore
